<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Weather Finder</h1>
            <p>Real-time forecasts at your fingertips</p>
        </header>

        <main>
            <div class="search-section">
                <input type="text" id="cityInput" placeholder="Enter a city name..." autocomplete="off">
                <button id="searchBtn">Search</button>
            </div>

            <div id="loading" class="status-message hidden">
                <div class="spinner"></div> Fetching data...
            </div>
            
            <div id="errorMessage" class="status-message error hidden">
                City not found. Please try again.
            </div>

            <div id="weatherDisplay" class="weather-card hidden">
                <h2 id="cityName">City Name</h2>
                <div class="main-weather">
                    <div class="temperature">
                        <span id="tempValue">--</span><span class="unit">°C</span>
                    </div>
                    <div class="condition-code" id="weatherCondition">Clear</div>
                </div>
                
                <div class="details-grid">
                    <div class="detail-item">
                        <span class="label">Wind Speed</span>
                        <span class="value" id="windSpeed">-- km/h</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Wind Direction</span>
                        <span class="value" id="windDir">-- °</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
